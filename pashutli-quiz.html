<title>פשוט כנרת – חידון בריאות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-dark:#1B3F72;
  --blue:#2B6CB0;
  --blue-mid:#4A90D9;
  --blue-light:#A8D4F5;
  --teal:#5BC8F5;
  --teal-light:#E8F6FD;
  --sky:#C8E8F8;
  --green:#2ECC88;
  --green-light:#E8FAF2;
  --orange:#F5A623;
  --yellow:#FFD166;
  --white:#FFFFFF;
  --bg:#C8E8F8;
  --surface:#FFFFFF;
  --surface2:#F0F7FF;
  --border:#C0DCF0;
  --text:#1B3F72;
  --soft:#5A7FA8;
  --soft2:#9BBDD8;
  --radius:20px;
  --radius-sm:14px;
  --shadow:0 4px 24px rgba(27,63,114,.1);
  --shadow-md:0 8px 36px rgba(27,63,114,.15);
}
body{font-family:'Rubik',sans-serif;background:linear-gradient(180deg,#C8E8F8 0%,#E8F4FC 40%,#F0F8FF 100%) fixed;background-size:100% 100vh;color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden}

/* ── HEADER ── */
.app-header{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);padding:0;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(27,63,114,.08);border-bottom:1px solid rgba(192,220,240,.5)}
.header-inner{display:flex;align-items:center;padding:10px 16px;gap:10px}
.header-logo{width:38px;height:38px;border-radius:12px;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.header-logo img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.header-brand{flex:1}
.header-brand h1{font-size:1rem;font-weight:800;color:var(--blue-dark);line-height:1.2}
.header-brand small{font-size:.68rem;color:var(--soft)}
.header-points{background:linear-gradient(135deg,#FFF9E6,#FFEDB3);border:1.5px solid var(--yellow);border-radius:30px;padding:5px 12px;display:flex;align-items:center;gap:5px;cursor:pointer}
.header-points span{font-size:.82rem;font-weight:700;color:#7A5500}
.header-points::before{content:'🪙';font-size:.82rem}
.progress-bar-wrap{background:var(--sky);height:3px}
.progress-bar-fill{height:3px;background:linear-gradient(90deg,var(--blue-mid),var(--teal));transition:width .4s;width:0%}

/* ── HERO ── */
.hero{background:linear-gradient(170deg,#1B3F72 0%,#2B6CB0 45%,#4A90D9 75%,#5BC8F5 100%);padding:36px 20px 56px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,255,255,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(91,200,245,.15) 0%,transparent 50%);pointer-events:none}
/* ענן דקורטיבי בתחתית */
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:60px;background:linear-gradient(180deg,#C8E8F8 0%,#E8F4FC 100%);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:30px;padding:6px 18px;font-size:.78rem;font-weight:600;color:#fff;margin-bottom:16px;backdrop-filter:blur(4px)}
.hero h2{font-size:2rem;font-weight:900;color:#fff;line-height:1.25;margin-bottom:10px;text-shadow:0 2px 12px rgba(0,0,0,.15)}
.hero h2 em{font-style:normal;color:var(--yellow)}
.hero p{font-size:.88rem;color:rgba(255,255,255,.85);max-width:320px;margin:0 auto 22px;line-height:1.75}
.hero-stats{display:flex;gap:8px;justify-content:center;margin-bottom:26px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:12px 14px;text-align:center;backdrop-filter:blur(8px)}
.hstat-val{font-size:1.3rem;font-weight:900;color:#fff;line-height:1}
.hstat-lbl{font-size:.65rem;color:rgba(255,255,255,.75);margin-top:3px;line-height:1.4}
.cta-btn{background:linear-gradient(135deg,var(--yellow),#FFA500);color:var(--blue-dark);border:none;border-radius:var(--radius);padding:16px 36px;font-family:'Rubik',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(245,166,35,.45);transition:transform .2s,box-shadow .2s;display:inline-flex;align-items:center;gap:8px}
.cta-btn:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(245,166,35,.55)}
.hero-wave{position:absolute;bottom:-2px;left:0;right:0}

/* ── MAIN ── */
main{max-width:600px;margin:0 auto;padding:20px 14px 60px;position:relative;z-index:5}

/* ── CARD ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid rgba(192,220,240,.6)}

/* ── STEP INDICATOR ── */
.step-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0 4px;margin-bottom:8px}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;transition:all .3s;border:2px solid var(--border);background:#fff;color:var(--soft)}
.step-dot.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(43,108,176,.35)}
.step-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.step-line{width:32px;height:2px;background:var(--border);border-radius:2px;transition:background .3s}
.step-line.done{background:var(--green)}

/* ── FORM ── */
.form-section-title{font-size:.78rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.input-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:13px 14px;background:#F0F7FF;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Rubik',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
.input-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,108,176,.1)}
.input-wrap input::placeholder{color:var(--soft2)}

/* ── QUIZ ── */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.quiz-pill{background:var(--teal-light);color:var(--blue-dark);font-size:.8rem;font-weight:700;padding:6px 14px;border-radius:30px;border:1px solid rgba(91,200,245,.3)}
.quiz-score{background:#FFF9E6;color:#7A5500;font-size:.82rem;font-weight:700;padding:6px 14px;border-radius:30px;border:1px solid rgba(255,209,102,.4)}
.quiz-prog{height:6px;background:var(--sky);border-radius:6px;margin-bottom:20px;overflow:hidden}
.quiz-progfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:6px;transition:width .5s}
.quiz-q{font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.55;margin-bottom:18px;text-align:center}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#F0F7FF;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;font-family:'Rubik',sans-serif;font-size:.92rem;color:var(--text);text-align:right;transition:all .2s;display:flex;align-items:center;gap:10px}
.opt:hover:not(:disabled){background:#DCF0FF;border-color:var(--blue-mid)}
.opt-letter{width:28px;height:28px;border-radius:8px;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--blue);flex-shrink:0;transition:all .2s}
.opt.correct{background:#E8FAF2;border-color:var(--green)}
.opt.correct .opt-letter{background:var(--green);color:#fff}
.opt.wrong{background:#FFF1EE;border-color:#FF8C7A}
.opt.wrong .opt-letter{background:#FF8C7A;color:#fff}
.opt:disabled{cursor:default}
.fb{margin-top:12px;padding:12px 14px;border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;display:none;line-height:1.55}
.fb.show{display:block}
.fb.ok{background:var(--green-light);border:1px solid rgba(46,204,136,.25);color:#1A7A50}
.fb.nope{background:#FFF1EE;border:1px solid rgba(255,140,122,.3);color:#CC4433}

/* ── RING / SUMMARY ── */
.ring-wrap{display:flex;justify-content:center;margin-bottom:20px}
.ring{position:relative;width:130px;height:130px}
.ring svg{transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num .big{font-size:2.2rem;font-weight:900;color:var(--blue)}
.ring-num small{font-size:.7rem;color:var(--soft)}
.qlist{list-style:none;margin:10px 0}
.qlist li{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.85rem;color:var(--soft)}
.qlist li:last-child{border:none}

/* ── VICTORY ── */
.victory-wrap{text-align:center;padding:16px 0}
.victory-trophy{font-size:4rem;animation:trophyBounce .7s ease-out}
.victory-title{font-size:1.8rem;font-weight:900;color:var(--blue-dark);margin:8px 0 4px}
.victory-disc-box{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:20px;padding:16px 40px;display:inline-flex;flex-direction:column;align-items:center;margin:14px 0;box-shadow:0 8px 28px rgba(27,63,114,.3)}
.victory-disc-box .big-pct{font-size:4.5rem;font-weight:900;color:#fff;line-height:1}
.victory-disc-box .lbl{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.8)}
.victory-sub{font-size:.88rem;color:var(--soft);line-height:1.65}

/* ── PRODUCTS ── */
.disc-hero{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-md)}
.disc-hero .label{font-size:.78rem;color:rgba(255,255,255,.7);margin-bottom:4px;font-weight:500}
.disc-hero .big{font-size:3.5rem;font-weight:900;color:#fff;line-height:1}
.disc-hero .msg{font-size:.85rem;color:rgba(255,255,255,.75);margin-top:6px}
.cart-upsell{background:linear-gradient(135deg,var(--teal-light),#F0F8FF);border:1.5px solid rgba(91,200,245,.35);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cart-upsell-left .title{font-size:.88rem;font-weight:700;color:var(--blue-dark)}
.cart-upsell-left .sub{font-size:.72rem;color:var(--soft);margin-top:2px}
.cart-upsell-right{text-align:left;white-space:nowrap}
.cart-upsell-right .bonus{font-size:.78rem;font-weight:700;color:var(--blue-mid);margin-bottom:2px}
.cart-upsell-right .total{font-size:1rem;font-weight:800;color:var(--blue-dark)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin:14px 0}
.pcard{background:rgba(255,255,255,.95);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .22s,box-shadow .22s;box-shadow:var(--shadow)}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.pcard.rec{border-color:var(--green)}
.pimg{height:175px;overflow:hidden;position:relative;background:var(--sky)}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.pcard:hover .pimg img{transform:scale(1.05)}
.pimg .ptag{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border-radius:8px;padding:3px 10px;font-size:.68rem;font-weight:700;color:var(--blue)}
.pimg .prec{position:absolute;top:8px;left:8px;background:var(--green);border-radius:8px;padding:3px 10px;font-size:.68rem;font-weight:700;color:#fff}
.pbody{padding:12px}
.pname{font-size:.88rem;font-weight:700;margin-bottom:3px;line-height:1.3;color:var(--text)}
.pdesc{font-size:.73rem;color:var(--soft);line-height:1.4;margin-bottom:9px}
.ppricing{display:flex;align-items:baseline;gap:7px;margin-bottom:10px}
.pnew{font-size:1.1rem;font-weight:800;color:var(--green)}
.pold{font-size:.78rem;color:var(--soft2);text-decoration:line-through}
.psave{font-size:.68rem;font-weight:700;color:var(--orange);background:#FFF3ED;border-radius:6px;padding:2px 6px}
.pactions{display:flex;gap:7px}
.bcart{flex:1;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Rubik',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .2s}
.bcart:hover{background:var(--blue-dark)}
.bsite{flex:1;padding:10px;background:#F0F7FF;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Rubik',sans-serif;font-size:.82rem;font-weight:600;color:var(--soft);text-decoration:none;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s}
.bsite:hover{border-color:var(--blue);color:var(--blue)}

/* ── CART SUMMARY ── */
.csummary{background:rgba(255,255,255,.95);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:14px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #DCF0FF;font-size:.86rem}
.crow:last-child{border:none}
.crow .cleft{color:var(--soft)}
.crow .cright{font-weight:700;color:var(--blue)}
.crow.total-row{font-size:.95rem;font-weight:800}
.crow.total-row .cleft{color:var(--text)}
.crow.total-row .cright{color:var(--green);font-size:1.1rem}
.ship-row .cright.free{color:var(--green)}
.ship-row .cright.paid{color:var(--soft)}

/* ── SHARE BANNER ── */
.share-banner{background:linear-gradient(135deg,var(--teal-light),#EBF9F4);border:1.5px solid rgba(91,200,245,.35);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.share-banner:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.share-banner-icon{font-size:1.8rem;flex-shrink:0}
.share-banner-text .t{font-size:.9rem;font-weight:800;color:var(--blue-dark)}
.share-banner-text .s{font-size:.74rem;color:var(--soft);margin-top:2px}
.share-banner-arrow{margin-right:auto;font-size:1.1rem;color:var(--teal);font-weight:700}

/* ── FREE SHIP ── */
.free-ship-block{background:linear-gradient(135deg,var(--teal-light),#F0F8FF);border:1.5px solid rgba(91,200,245,.3);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .2s}
.free-ship-block:hover{transform:translateY(-2px)}

/* ── BUTTONS ── */
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Rubik',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(43,108,176,.25)}
.btn:hover{opacity:.92;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--soft);box-shadow:none}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-green{background:linear-gradient(135deg,var(--green),#00D4A0);box-shadow:0 4px 16px rgba(46,204,136,.3)}
.btn-next{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Rubik',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:14px;box-shadow:0 4px 16px rgba(43,108,176,.2)}
.sec-title{font-size:.95rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--blue-dark)}
.info-box{background:#F0F7FF;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:.82rem;color:var(--soft);line-height:1.65}
.info-box strong{color:var(--blue)}
